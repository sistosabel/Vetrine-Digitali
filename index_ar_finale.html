<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Viewer</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f3f4f6}
.container{padding:12px;max-width:800px;margin:auto}
button{padding:10px;border-radius:10px;border:1px solid #ccc;margin:4px}
.primary{background:#000;color:#fff}
.controls{position:absolute;bottom:20px;left:10px;right:10px;display:flex;gap:8px;flex-wrap:wrap;z-index:10;}
#prompt{position:absolute;top:10px;left:10px;background:#fff;padding:6px 10px;border-radius:10px;font-size:12px;z-index:10;}
</style>
</head>

<body>
<div class="container">

<h3>Link rapidi</h3>

<a target="_blank" href="https://forms.office.com/pages/responsepage.aspx?id=b-cddlw9dEGRfFrU0GNgy7KRrjqawSdLquppF2B-GUpURVNWOVVBMjQ3NTQxUDZWSEtFRE1UOVlGSi4u&route=shorturl">
<button class="primary">Apri Modulo</button>
</a>

<a target="_blank" href="https://posteitaliane.sharepoint.com">
<button>Apri SharePoint</button>
</a>

<h3>AR Viewer</h3>

<div style="position:relative">

<div id="prompt">Muovi il telefono per rilevare superficie</div>

<model-viewer
id="mv"
src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"
ar
ar-modes="webxr scene-viewer quick-look"
ar-scale="fixed"
ar-placement="floor"
camera-controls
orientation="0deg 0deg 0deg"
xr-environment
style="width:100%;height:420px">
</model-viewer>

<div class="controls">

<button id="btnAr" class="primary">Apri AR</button>
<button id="btnShot">📸 Foto</button>

<button onclick="setModel('verticale')">Verticale</button>
<button onclick="setModel('oriz55')">55”</button>
<button onclick="setModel('oriz65')">65”</button>

</div>

</div>

<div id="dim" style="margin-top:10px;font-size:13px;color:#555"></div>

</div>

<script>

const mv = document.getElementById("mv")
const btnShot = document.getElementById("btnShot")
const dim = document.getElementById("dim")

const MODELS = {
verticale:{
src:"https://modelviewer.dev/shared-assets/models/Astronaut.glb",
placement:"floor",
dim:"Verticale: 84 x 180 cm"
},
oriz55:{
src:"https://modelviewer.dev/shared-assets/models/RobotExpressive.glb",
placement:"wall",
dim:"55”: 122 x 68 cm"
},
oriz65:{
src:"https://modelviewer.dev/shared-assets/models/Chair.glb",
placement:"wall",
dim:"65”: 144 x 81 cm"
}
}

function setModel(type){
const m = MODELS[type]
mv.src = m.src
mv.setAttribute("ar-placement", m.placement)
mv.setAttribute("orientation","0deg 0deg 0deg")
dim.innerText = m.dim
}

document.getElementById("btnAr").onclick = async ()=>{
if(!location.protocol.startsWith("http")){
alert("Apri da GitHub Pages o HTTPS")
return
}
try{
await mv.activateAR()
}catch{
alert("AR non disponibile")
}
}

mv.addEventListener("ar-status",(e)=>{
if(e.detail.status === "session-started"){
btnShot.style.display = "block"
}else{
btnShot.style.display = "none"
}
})

btnShot.onclick = async ()=>{
try{
const data = await mv.toDataURL("image/png")
const a = document.createElement("a")
a.href = data
a.download = "foto-ar.png"
a.click()
}catch{
alert("Screenshot disponibile solo in AR browser")
}
}

setModel("verticale")

</script>

</body>
</html>
